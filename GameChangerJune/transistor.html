<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ට්‍රාන්සිස්ටරය - ජල කරාම උපමාව (Animated)</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #05050a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #0f0f16;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(176, 38, 255, 0.15);
            border: 1px solid #33154d;
            text-align: center;
            width: 850px;
        }
        h2 {
            color: #00ffff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
            margin-bottom: 30px;
        }
        .simulation-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #151520;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2a3d;
            margin-bottom: 25px;
        }
        .panel {
            width: 48%;
            background: #0a0a10;
            border-radius: 8px;
            padding: 15px 0;
            border: 1px solid #222;
        }
        .panel h3 {
            color: #b026ff;
            margin-top: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .slider-section {
            background-color: #1a1a26;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        input[type="range"] {
            width: 85%;
            margin: 15px 0;
            accent-color: #00ffff;
            cursor: pointer;
        }
        .status-box {
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border-radius: 6px;
            color: white;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        /* SVG Styling */
        .wire { fill: none; stroke: #333; stroke-width: 4; stroke-linecap: round; }
        .flow-path { 
            fill: none; 
            stroke-width: 4; 
            stroke-dasharray: 10, 15; 
            stroke-linecap: round;
        }
        .flow-ic { stroke: #00ffff; } /* Collector current color */
        .flow-ib { stroke: #b026ff; } /* Base current color */
    </style>
</head>
<body>

    <div class="container">
        <h2>ට්‍රාන්සිස්ටර ක්‍රියාකාරිත්වය සහ ජල කරාම උපමාව</h2>
        
        <div class="slider-section">
            <label for="main-slider" style="font-size: 18px; color: #ccc;">
                ආදානය පාලනය කරන්න (කරාමය / පාදම): <span id="val-display" style="color: #00ffff; font-weight:bold;">0</span>%
            </label><br>
            <input type="range" id="main-slider" min="0" max="100" value="0">
        </div>

        <div class="simulation-area">
            
            <div class="panel">
                <h3>ජල පද්ධතිය</h3>
                <svg width="300" height="350" viewBox="0 0 300 350">
                    <rect x="100" y="20" width="100" height="70" fill="rgba(30, 136, 229, 0.2)" stroke="#1e88e5" stroke-width="2"/>
                    <text x="150" y="60" fill="#1e88e5" font-size="14" text-anchor="middle">විශාල ටැංකිය</text>
                    
                    <rect x="135" y="90" width="30" height="70" fill="#111" stroke="#555" stroke-width="2"/>
                    <rect x="137" y="90" width="26" height="70" fill="#1e88e5" opacity="0.6"/>

                    <circle cx="150" cy="175" r="30" fill="#1a1a26" stroke="#b026ff" stroke-width="3"/>
                    <line id="valve-handle" x1="150" y1="145" x2="150" y2="205" stroke="#b026ff" stroke-width="6" stroke-linecap="round" transform="rotate(90 150 175)"/>
                    
                    <rect x="135" y="205" width="30" height="110" fill="#111" stroke="#555" stroke-width="2"/>
                    
                    <rect id="water-flow" x="150" y="205" width="0" height="110" fill="#00ffff" opacity="0.8"/>
                    
                    <path id="water-drops" d="M 150 205 L 150 315" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="10, 20" opacity="0"/>

                    <text x="50" y="180" fill="#b026ff" font-size="14" font-weight="bold">කරාමය</text>
                    <path d="M 90 175 L 115 175" stroke="#b026ff" stroke-width="2" marker-end="url(#arrow)"/>
                    <text x="220" y="260" fill="#00ffff" font-size="14">ජල ප්‍රවාහය</text>
                </svg>
            </div>

            <div class="panel">
                <h3>ට්‍රාන්සිස්ටර පරිපථය</h3>
                <svg width="300" height="350" viewBox="0 0 300 350">
                    
                    <path class="wire" d="M 150 40 L 150 90"/> <path class="wire" d="M 150 140 L 150 190"/> <path class="wire" d="M 60 210 L 120 210"/> <path class="wire" d="M 150 250 L 150 310"/> <path class="wire" d="M 130 310 L 170 310 M 140 318 L 160 318"/> <text x="160" y="35" fill="#1e88e5" font-size="14" font-weight="bold">+ Vcc</text>
                    <text x="160" y="180" fill="#aaa" font-size="12">C</text>
                    <text x="125" y="195" fill="#aaa" font-size="12">B</text>
                    <text x="160" y="260" fill="#aaa" font-size="12">E</text>
                    <text x="15" y="215" fill="#b026ff" font-size="14">ආදානය</text>

                    <path id="ic-flow" class="flow-path flow-ic" d="M 150 40 L 150 90 M 150 140 L 150 190 L 135 210 L 150 230 L 150 310"/>
                    <path id="ib-flow" class="flow-path flow-ib" d="M 60 210 L 120 210 L 135 210 L 150 230 L 150 310"/>

                    <line x1="120" y1="190" x2="120" y2="230" stroke="#fff" stroke-width="4"/> <line x1="120" y1="200" x2="150" y2="190" stroke="#fff" stroke-width="3"/> <line x1="120" y1="220" x2="150" y2="250" stroke="#fff" stroke-width="3"/> <polygon points="145,248 135,236 140,230" fill="#fff"/> <circle cx="135" cy="210" r="45" stroke="#444" stroke-width="2" fill="none"/>

                    <circle id="circuit-bulb" cx="150" cy="115" r="25" fill="#111" stroke="#555" stroke-width="2"/>
                    <path id="filament" d="M 135 105 L 165 125 M 135 125 L 165 105" stroke="#333" stroke-width="3"/>
                    
                    <defs>
                        <filter id="glow-bulb">
                            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

                </svg>
            </div>
        </div>

        <div class="status-box" id="status-display">කපා හැරීම (Cut-off)</div>
    </div>

    <script>
        const slider = document.getElementById('main-slider');
        const valDisplay = document.getElementById('val-display');
        
        // Water
        const valveHandle = document.getElementById('valve-handle');
        const waterFlow = document.getElementById('water-flow');
        const waterDrops = document.getElementById('water-drops');
        
        // Circuit
        const bulb = document.getElementById('circuit-bulb');
        const filament = document.getElementById('filament');
        const icFlow = document.getElementById('ic-flow');
        const ibFlow = document.getElementById('ib-flow');
        const statusDisplay = document.getElementById('status-display');

        let dashOffset = 0;

        function updateSimulation() {
            let val = parseInt(slider.value);
            valDisplay.textContent = val;
            let ratio = val / 100;

            // --- Water Animation ---
            let angle = 90 - (val * 0.9); 
            valveHandle.setAttribute('transform', `rotate(${angle} 150 175)`);
            
            let waterWidth = ratio * 26;
            waterFlow.setAttribute('width', waterWidth);
            waterFlow.setAttribute('x', 150 - (waterWidth / 2));
            
            // --- Circuit Animation ---
            if (val > 0) {
                // Bulb Glow
                bulb.setAttribute('fill', `rgba(0, 255, 255, ${0.1 + ratio * 0.8})`);
                bulb.setAttribute('stroke', `rgba(0, 255, 255, ${0.5 + ratio * 0.5})`);
                bulb.style.filter = `drop-shadow(0 0 ${10 + ratio * 30}px rgba(0, 255, 255, ${ratio}))`;
                filament.setAttribute('stroke', '#ffffff');

                // Flow opacities
                icFlow.style.opacity = 0.2 + (ratio * 0.8);
                ibFlow.style.opacity = 0.4 + (ratio * 0.6); // Base current is always somewhat visible if val > 0
                waterDrops.style.opacity = ratio;

                // Flow width
                icFlow.style.strokeWidth = 2 + (ratio * 4);
                
            } else {
                // OFF State
                bulb.setAttribute('fill', '#111');
                bulb.setAttribute('stroke', '#555');
                bulb.style.filter = 'none';
                filament.setAttribute('stroke', '#333');
                
                icFlow.style.opacity = 0;
                ibFlow.style.opacity = 0;
                waterDrops.style.opacity = 0;
            }

            // --- Status ---
            if (val === 0) {
                statusDisplay.innerHTML = 'කපා හැරීමේ කලාපය (Cut-off) - ස්විචය OFF';
                statusDisplay.style.backgroundColor = '#8c0032'; // Dark Red
                statusDisplay.style.boxShadow = '0 0 15px #8c0032';
            } else if (val === 100) {
                statusDisplay.innerHTML = 'සංතෘප්ත කලාපය (Saturation) - ස්විචය ON';
                statusDisplay.style.backgroundColor = '#007a33'; // Dark Green
                statusDisplay.style.boxShadow = '0 0 15px #007a33';
            } else {
                statusDisplay.innerHTML = 'සක්‍රීය කලාපය (Active) - වර්ධකයක් ලෙස';
                statusDisplay.style.backgroundColor = '#a85b00'; // Dark Orange
                statusDisplay.style.boxShadow = '0 0 15px #a85b00';
            }
        }

        // Animation Loop for Current Flow (Dots moving)
        function animateFlow() {
            let val = parseInt(slider.value);
            if(val > 0) {
                let speed = 0.5 + (val / 25); // Speed increases with slider
                dashOffset -= speed;
                icFlow.style.strokeDashoffset = dashOffset;
                // Base current moves a bit slower
                ibFlow.style.strokeDashoffset = dashOffset * 0.8; 
                waterDrops.style.strokeDashoffset = dashOffset * 1.5;
            }
            requestAnimationFrame(animateFlow);
        }

        // Listeners
        slider.addEventListener('input', updateSimulation);
        
        // Init
        updateSimulation();
        animateFlow();

    </script>
</body>
</html>
