<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine - Tangential Velocity Simulation</title>
    <style>
        body {
            background-color: #050510;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header p {
            color: #aaaaaa;
            margin-top: 5px;
        }
        canvas {
            background-color: #020205;
            border: 2px solid #1a1a3a;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            cursor: crosshair;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            background: #111122;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        button {
            background: linear-gradient(45deg, #0055ff, #00d2ff);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }
        #releaseBtn {
            background: linear-gradient(45deg, #ff0055, #ff5500);
        }
        #releaseBtn:hover {
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00d2ff;
            font-weight: bold;
        }
        input[type="range"] {
            accent-color: #00d2ff;
        }
        /* Watermark එක දකුණු පස පහළට ගෙන ගොස් ඇත */
        .watermark {
            position: absolute;
            opacity: 0.15;
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            bottom: 20px;
            right: 25px;
            color: #00d2ff;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>System: Tangential Velocity</h2>
        <p>ස්පර්ශීය ප්‍රවේගය (v) සහ කේන්ද්‍රාභිසාරී බලය (Fc) ඉවත් වූ විට සිදුවන දේ නිරීක්ෂණය කරන්න.</p>
    </div>

    <div style="position: relative;">
        <div class="watermark">PHYSICS ENGINE</div>
        <canvas id="simCanvas" width="800" height="450"></canvas>
    </div>

    <div class="controls">
        <button id="toggleBtn" onclick="toggleMotion()">Pause / Play</button>
        <button id="releaseBtn" onclick="releaseBall()">Cut String (කඹය කැපීම)</button>
        <button onclick="resetSim()">Reset</button>
        <div class="slider-container">
            <label for="speedSlider">Speed (&omega;):</label>
            <input type="range" id="speedSlider" min="0.01" max="0.1" step="0.01" value="0.03" onchange="updateSpeed()">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // Simulation Variables
        let cx = canvas.width / 2;
        let cy = canvas.height / 2;
        let radius = 150;
        let angle = 0;
        let angularVelocity = 0.03;
        let isRunning = true;
        let isReleased = false;
        
        // Ball properties
        let ballX = cx + radius;
        let ballY = cy;
        let linearVx = 0;
        let linearVy = 0;
        
        // Trail points
        let trail = [];

        function updateSpeed() {
            angularVelocity = parseFloat(document.getElementById('speedSlider').value);
        }

        function toggleMotion() {
            isRunning = !isRunning;
        }

        function releaseBall() {
            if (!isReleased) {
                isReleased = true;
                linearVx = -radius * angularVelocity * Math.sin(angle);
                linearVy = radius * angularVelocity * Math.cos(angle);
            }
        }

        function resetSim() {
            isReleased = false;
            isRunning = true;
            angle = 0;
            ballX = cx + radius;
            ballY = cy;
            document.getElementById('speedSlider').value = 0.03;
            angularVelocity = 0.03;
            trail = []; 
        }

        function drawArrow(fromX, fromY, toX, toY, color, label) {
            const headlen = 15;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fillStyle = color;
            ctx.fill();

            if(label) {
                ctx.fillStyle = color;
                ctx.font = "bold 18px Arial";
                ctx.fillText(label, toX + 10, toY + 10);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw center point
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // Draw Orbit Guide
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 170, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 10]);
            ctx.stroke();
            ctx.setLineDash([]); 

            // Calculate Motion
            if (isRunning) {
                if (!isReleased) {
                    angle += angularVelocity;
                    ballX = cx + radius * Math.cos(angle);
                    ballY = cy + radius * Math.sin(angle);
                } else {
                    ballX += linearVx; 
                    ballY += linearVy;
                }
                
                trail.push({x: ballX, y: ballY});
                if(trail.length > 80) trail.shift(); 
            }

            // Draw Trail
            if(trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for(let i=1; i<trail.length; i++) {
                    ctx.lineTo(trail[i].x, trail[i].y);
                }
                ctx.strokeStyle = 'rgba(170, 255, 0, 0.4)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // Draw Vectors
            if (!isReleased) {
                drawArrow(ballX, ballY, cx, cy, '#ff0055', 'Fc');
            }

            // Tangential Velocity Vector
            let tvx, tvy;
            if(!isReleased) {
                tvx = -Math.sin(angle);
                tvy = Math.cos(angle);
            } else {
                let mag = Math.sqrt(linearVx*linearVx + linearVy*linearVy);
                tvx = linearVx / mag;
                tvy = linearVy / mag;
            }
            drawArrow(ballX, ballY, ballX + tvx * 80, ballY + tvy * 80, '#00d2ff', 'v');

            // Draw Ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#aaff00';
            ctx.fill();
            ctx.strokeStyle = '#558800';
            ctx.lineWidth = 2;
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
