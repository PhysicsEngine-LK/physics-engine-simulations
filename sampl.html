<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Template | Physics Engine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050814;
            --panel-bg: rgba(6, 11, 25, 0.8);
            --border-color: rgba(0, 243, 255, 0.3);
            --cyan: #00f3ff;
            --purple: #bc13fe;
            --text-main: #e0f8ff;
            --text-muted: #8ab4f8;
            --canvas-bg: #03050a;
            --btn-bg: rgba(188, 19, 254, 0.1);
            --btn-hover: rgba(188, 19, 254, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::after {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.1), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.1), transparent 40%);
            z-index: -1; pointer-events: none;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(5, 8, 20, 0.9);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(10px); z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .back-btn {
            color: var(--cyan); text-decoration: none; font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            padding: 8px 16px; border: 1px solid var(--cyan); background: rgba(0, 243, 255, 0.05);
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .back-btn:hover { background: var(--cyan); color: var(--bg-color); box-shadow: 0 0 15px var(--cyan); }

        .sim-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; margin: 0; }
        .logo { height: 40px; filter: drop-shadow(0 0 5px var(--cyan)); }

        .container {
            display: grid; grid-template-columns: 1fr 350px; gap: 20px;
            padding: 20px; flex-grow: 1; max-width: 1600px; margin: 0 auto; width: 100%;
        }

        .panel {
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 20px; box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05), 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }

        .panel::before {
            content: ""; position: absolute; top: 0; left: 0; width: 30px; height: 30px;
            border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); border-top-left-radius: 12px; opacity: 0.5;
        }
        .panel::after {
            content: ""; position: absolute; bottom: 0; right: 0; width: 30px; height: 30px;
            border-bottom: 2px solid var(--purple); border-right: 2px solid var(--purple); border-bottom-right-radius: 12px; opacity: 0.5;
        }

        .sim-area { display: flex; flex-direction: column; gap: 20px; }

        .canvas-container {
            flex-grow: 1; background: var(--canvas-bg); border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 8px; position: relative; display: flex; justify-content: center; align-items: center;
            min-height: 400px; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        canvas { width: 100%; height: 100%; display: block; border-radius: 8px; }

        .info-box { background: rgba(0, 243, 255, 0.05); border-left: 4px solid var(--cyan); padding: 15px; border-radius: 4px; font-size: 1.1rem; color: var(--text-main); line-height: 1.6; }
        .info-box h3 { color: var(--cyan); font-family: 'Orbitron', sans-serif; margin-bottom: 10px; font-size: 1.2rem; }

        .controls-area { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: calc(100vh - 100px); }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .val-display { color: var(--cyan); font-weight: 700; font-family: 'Orbitron', sans-serif; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; outline: none; margin-top: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); cursor: pointer; box-shadow: 0 0 10px var(--cyan); transition: 0.2s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 0 15px var(--cyan), 0 0 5px #fff; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background: var(--btn-bg); color: var(--text-main); border: 1px solid var(--purple); padding: 12px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: var(--btn-hover); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); transform: translateY(-2px); }
        button.active { background: var(--purple); color: #fff; box-shadow: 0 0 20px var(--purple); }

        @media (max-width: 992px) { .container { grid-template-columns: 1fr; } .controls-area { max-height: none; } }
        @media (max-width: 600px) { .header-left { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">&lt; BACK</a>
            <h1 class="sim-title">Simulation Title (???????)</h1>
        </div>
        <img src="assets/PHYSICSENGINEL.png" alt="Physics Engine Logo" class="logo" onerror="this.style.display='none'">
    </header>

    <div class="container">
        
        <div class="sim-area">
            <div class="panel canvas-container">
                <canvas id="simCanvas"></canvas>
            </div>
            <div class="panel info-box">
                <h3>Theory & Explanation (??????????)</h3>
                <p id="theory-text">??? ??????? ????? ???? ????? ??????????? ??????? ???????? ????. ??????????, ?????, ???? ??????? ???? ????? ???? ?????? ??.</p>
            </div>
        </div>

        <div class="panel controls-area">
            
            <div class="info-box" style="background: rgba(188, 19, 254, 0.1); border-left-color: var(--purple); margin-bottom: 20px;">
                <h3 style="color: var(--purple); margin:0;">Status Panel (???????)</h3>
                <div style="font-size: 1.5rem; font-weight: bold; margin-top: 5px;" id="status-display">Active Mode</div>
            </div>

            <div class="control-group">
                <label><span>?????????? (Voltage)</span><span class="val-display"><span id="v-val">5.0</span> V</span></label>
                <input type="range" id="v-slider" min="0" max="10" step="0.1" value="5.0">
            </div>

            <div class="control-group">
                <label><span>????? (Current)</span><span class="val-display"><span id="i-val">2.5</span> mA</span></label>
                <input type="range" id="i-slider" min="0" max="5" step="0.1" value="2.5">
            </div>

            <div class="btn-grid">
                <button class="active" id="btn-mode1">Mode 1</button>
                <button id="btn-mode2">Mode 2</button>
                <button id="btn-reset" style="grid-column: span 2; border-color: var(--cyan); background: rgba(0, 243, 255, 0.05); color: var(--cyan);">Reset Simulation</button>
            </div>

        </div>

    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const vSlider = document.getElementById('v-slider');
        const iSlider = document.getElementById('i-slider');
        const vVal = document.getElementById('v-val');
        const iVal = document.getElementById('i-val');

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); }
        window.addEventListener('resize', resize);

        function draw() {
            ctx.fillStyle = '#03050a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const v = parseFloat(vSlider.value); const i = parseFloat(iSlider.value);
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            const radius = 20 + (v * 10); const glow = i * 15;
            
            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00f3ff'; ctx.shadowBlur = glow; ctx.shadowColor = '#00f3ff'; ctx.fill();
            
            ctx.beginPath(); ctx.arc(centerX, centerY, radius * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.shadowBlur = 0; 
        }

        vSlider.addEventListener('input', (e) => { vVal.textContent = parseFloat(e.target.value).toFixed(1); draw(); });
        iSlider.addEventListener('input', (e) => { iVal.textContent = parseFloat(e.target.value).toFixed(1); draw(); });

        setTimeout(resize, 100);

        document.getElementById('btn-mode1').addEventListener('click', function() {
            this.classList.add('active'); document.getElementById('btn-mode2').classList.remove('active');
            document.getElementById('status-display').textContent = 'Mode 1 Active';
        });
        document.getElementById('btn-mode2').addEventListener('click', function() {
            this.classList.add('active'); document.getElementById('btn-mode1').classList.remove('active');
            document.getElementById('status-display').textContent = 'Mode 2 Active';
        });
        document.getElementById('btn-reset').addEventListener('click', function() {
            vSlider.value = 5.0; iSlider.value = 2.5; vVal.textContent = "5.0"; iVal.textContent = "2.5"; draw();
        });
    </script>
</body>
</html>
