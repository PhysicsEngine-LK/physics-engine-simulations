<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine - Velocity Profile</title>
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #f97316;
            --bg: #0f172a;
            --panel-bg: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 20px;
        }
        canvas {
            background: #050b14;
            border-radius: 8px;
            border: 2px solid #334155;
            width: 100%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
            margin-bottom: 20px;
        }
        .controls {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        .control-group span {
            color: var(--primary);
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .readout {
            grid-column: span 2;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--accent);
            margin-top: 10px;
            display: flex;
            justify-content: space-around;
        }
        .readout span {
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 PHYSICS ENGINE : ZERO SLIP</h1>
    <div class="subtitle">නළයක් තුළ ද්‍රව ස්තරවල ප්‍රවේගය වෙනස් වන ආකාරය (Parabolic Velocity Profile)</div>
    
    <canvas id="simCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>උපරිම ප්‍රවේගය (Max Velocity): <span id="vValue">5.0</span></label>
            <input type="range" id="sliderV" min="2" max="10" step="0.5" value="5.0">
        </div>
        <div class="readout">
            <div>මධ්‍යයේ ප්‍රවේගය: <span id="centerVOut">5.0</span> m/s</div>
            <div>බිත්තිය අසල ප්‍රවේගය: <span>0.0</span> m/s</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const sliderV = document.getElementById('sliderV');
    
    const vValueDisplay = document.getElementById('vValue');
    const centerVOut = document.getElementById('centerVOut');
    
    let particles = [];
    const numParticles = 400;

    // Initialize particles (yNorm goes from -1 at top to 1 at bottom)
    for(let i = 0; i < numParticles; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            yNorm: Math.random() * 2 - 1, 
            size: Math.random() * 2 + 1,
            color: `hsl(${190 + Math.random() * 40}, 100%, 70%)` // Light blue fluid colors
        });
    }

    function drawArrow(context, fromx, fromy, tox, toy) {
        let headlen = 8; 
        let dx = tox - fromx;
        let dy = toy - fromy;
        let angle = Math.atan2(dy, dx);
        context.beginPath();
        context.moveTo(fromx, fromy);
        context.lineTo(tox, toy);
        context.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
        context.moveTo(tox, toy);
        context.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
        context.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let vmax = parseFloat(sliderV.value);
        let widthMult = 3.0;
        
        vValueDisplay.innerText = vmax.toFixed(1);
        centerVOut.innerText = vmax.toFixed(1);
        
        // Calculate dynamic dimensions
        let radiusPx = widthMult * 35; // Pipe radius in pixels
        let centerY = canvas.height / 2;
        let topY = centerY - radiusPx;
        let bottomY = centerY + radiusPx;

        // 1. Draw Pipe Walls
        ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
        ctx.fillRect(0, topY, canvas.width, radiusPx * 2);
        
        ctx.strokeStyle = '#00d2ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, topY);
        ctx.lineTo(canvas.width, topY);
        ctx.moveTo(0, bottomY);
        ctx.lineTo(canvas.width, bottomY);
        ctx.stroke();

        // 2. Draw Parabolic Velocity Profile (The Arrows)
        let arrowStartX = 150;
        
        // Vertical dashed line
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(arrowStartX, topY);
        ctx.lineTo(arrowStartX, bottomY);
        ctx.stroke();
        ctx.setLineDash([]); // Reset dash
        
        // Draw the Parabola curve line connecting arrow heads
        ctx.strokeStyle = 'rgba(249, 115, 22, 0.5)'; // Orange transparent
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let yNorm = -1; yNorm <= 1; yNorm += 0.05) {
            let v = vmax * (1 - Math.pow(yNorm, 2));
            let pxY = centerY + (yNorm * radiusPx);
            let pxX = arrowStartX + (v * 20); // Scale velocity to pixels
            if(yNorm === -1) ctx.moveTo(pxX, pxY);
            else ctx.lineTo(pxX, pxY);
        }
        ctx.stroke();

        // Draw individual horizontal arrows
        ctx.strokeStyle = '#f97316'; // Neon Orange
        ctx.lineWidth = 2;
        let numArrows = 14; // Must be even to have one exactly in the center
        for(let i = 0; i <= numArrows; i++) {
            let yNorm = -1 + (i * (2 / numArrows)); // -1 to 1
            let v = vmax * (1 - Math.pow(yNorm, 2)); // Parabolic equation!
            
            let yNode = centerY + (yNorm * radiusPx);
            let arrowLen = v * 20; // Length scales with velocity
            
            if(arrowLen > 2) {
                drawArrow(ctx, arrowStartX, yNode, arrowStartX + arrowLen, yNode);
            } else {
                // Draw a dot for zero velocity at walls
                ctx.fillStyle = '#f97316';
                ctx.beginPath();
                ctx.arc(arrowStartX, yNode, 3, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // 3. Animate Particles
        particles.forEach(p => {
            // Velocity profile equation applied to particles: v = vmax * (1 - y^2)
            let v = vmax * (1 - Math.pow(p.yNorm, 2)); 

            p.x += v * 0.8; // Move particle

            // Loop back to start
            if(p.x > canvas.width + 10) {
                p.x = -10;
                p.yNorm = Math.random() * 2 - 1; // Randomize height on respawn
            }

            // Only draw if inside current pipe width
            if (Math.abs(p.yNorm) <= 1) {
                let pixelY = centerY + (p.yNorm * radiusPx);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, pixelY, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
