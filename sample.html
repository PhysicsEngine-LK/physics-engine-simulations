<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine | Simulation Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-panel: #13151e;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-primary: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.2);
            --border-color: rgba(255, 255, 255, 0.08);
            --radius: 12px;
            --font-main: 'Space Grotesk', system-ui, sans-serif;
            --font-brand: 'Orbitron', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.05), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(184, 139, 255, 0.05), transparent 50%);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .brand {
            font-family: var(--font-brand);
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .control-value {
            color: var(--accent-primary);
            font-family: monospace;
            font-size: 1rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        button {
            width: 100%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .readout {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            color: #fff;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">Physics Engine</div>
        <div class="subtitle">Simulation Template - Describe the Simulation Here</div>
    </div>

    <div class="dashboard">
        <!-- Visualizer Area -->
        <div class="canvas-container">
            <!-- Set fixed logical dimensions, CSS handles scaling -->
            <canvas id="simCanvas" width="800" height="500"></canvas>
        </div>

        <!-- Controls Area -->
        <div class="panel controls">
            <div class="control-group">
                <div class="control-label">
                    <span>Parameter 1</span>
                    <span class="control-value" id="val1-display">50%</span>
                </div>
                <input type="range" id="param1" min="0" max="100" value="50">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>Parameter 2</span>
                    <span class="control-value" id="val2-display">1.0</span>
                </div>
                <input type="range" id="param2" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <button id="actionBtn">Start / Reset</button>
            </div>

            <div class="readout">
                <div>Status: <span style="color: var(--accent-primary)">Ready</span></div>
                <div>Output: <span id="output-val">0.00</span></div>
            </div>
        </div>
    </div>

    <script>
        // Setup Canvas
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const param1 = document.getElementById('param1');
        const val1Display = document.getElementById('val1-display');
        const param2 = document.getElementById('param2');
        const val2Display = document.getElementById('val2-display');
        const actionBtn = document.getElementById('actionBtn');
        const outputVal = document.getElementById('output-val');

        // State variables
        let isRunning = false;
        let p1Value = parseInt(param1.value);
        let p2Value = parseFloat(param2.value);
        let time = 0;

        // Event Listeners
        param1.addEventListener('input', (e) => {
            p1Value = parseInt(e.target.value);
            val1Display.textContent = p1Value + '%';
            draw();
        });

        param2.addEventListener('input', (e) => {
            p2Value = parseFloat(e.target.value);
            val2Display.textContent = p2Value.toFixed(1);
            draw();
        });

        actionBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            if(isRunning) {
                actionBtn.textContent = 'Pause';
                actionBtn.style.background = 'var(--accent-primary)';
                actionBtn.style.color = '#000';
                loop();
            } else {
                actionBtn.textContent = 'Resume';
                actionBtn.style.background = 'rgba(0, 229, 255, 0.1)';
                actionBtn.style.color = 'var(--accent-primary)';
            }
        });

        // Drawing Function
        function draw() {
            // Clear background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw a grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=50) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Draw something based on parameters (e.g., a simple sine wave or particle)
            ctx.beginPath();
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 3;
            for(let x=0; x<canvas.width; x++) {
                // p1Value changes amplitude, p2Value changes frequency
                let y = canvas.height/2 + Math.sin((x * p2Value * 0.05) + time) * (p1Value * 1.5);
                if(x===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();

            // Update output readout
            outputVal.textContent = Math.abs(Math.sin(time)).toFixed(2);
        }

        // Animation Loop
        function loop() {
            if(!isRunning) return;
            time += 0.05;
            draw();
            requestAnimationFrame(loop);
        }

        // Initial Draw
        draw();

    </script>
</body>
</html>
