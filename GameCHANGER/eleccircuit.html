<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine: Phase 4 - Rapid Collapse V3</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffff;
            font-size: 22px;
        }
        .control-panel {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .action-btn {
            background-color: #ff00ff;
            color: #fff;
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 0 10px #ff00ff;
            min-width: 150px;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled {
            background-color: #333;
            border-color: #444;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
        }
        .reset-btn {
            background-color: #222;
            color: #777;
            border: 2px solid #444;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .reset-btn:hover { background-color: #333; color: #fff; }
        .step-display {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #333;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background-color: #141414;
            border: 2px solid #222;
            border-radius: 12px;
            box-shadow: inset 0 0 20px #000;
        }
    </style>
</head>
<body>

    <h1>Physics Engine // Phase 04: The Universal Collapse V3</h1>
    
    <div class="control-panel">
        <div class="btn-row">
            <button id="btn-prev" class="action-btn" onclick="prevStep()" disabled>&laquo; පෙර පියවර (Back)</button>
            <button class="reset-btn" onclick="resetSim()">මුලට (Reset)</button>
            <button id="btn-next" class="action-btn" onclick="nextStep()">ඊළඟ පියවර (Next) &raquo;</button>
        </div>
        <div id="step-text" class="step-display">ආරම්භක පරිපථය: 10V කෝෂයක්, 8Ω ප්‍රතිරෝධයක් සහ සමාන්තරගත 6Ω හා 3Ω.</div>
    </div>

    <canvas id="simCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const stepText = document.getElementById('step-text');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        
        let state = 0; // 0 to 4
        let particles = [];
        const numParticles = 60; // Increased for a better continuous flow look

        // Path Definitions for Exact Tracking
        const pState3 = [
            {x: 100, y: 200}, {x: 100, y: 100}, {x: 750, y: 100},
            {x: 750, y: 300}, {x: 100, y: 300}, {x: 100, y: 200}
        ];
        
        const pState4Top = [ // 6 Ohm path
            {x: 100, y: 200}, {x: 100, y: 100}, {x: 350, y: 100},
            {x: 450, y: 50}, {x: 650, y: 50}, {x: 750, y: 100},
            {x: 750, y: 300}, {x: 100, y: 300}, {x: 100, y: 200}
        ];

        const pState4Bot = [ // 3 Ohm path
            {x: 100, y: 200}, {x: 100, y: 100}, {x: 350, y: 100},
            {x: 450, y: 150}, {x: 650, y: 150}, {x: 750, y: 100},
            {x: 750, y: 300}, {x: 100, y: 300}, {x: 100, y: 200}
        ];

        function getPathLength(path) {
            let len = 0;
            for(let i=0; i<path.length-1; i++) {
                len += Math.hypot(path[i+1].x - path[i].x, path[i+1].y - path[i].y);
            }
            return len;
        }

        const lenState3 = getPathLength(pState3); // 1700
        const lenState4 = getPathLength(pState4Top); // ~1723

        function initParticles() {
            particles = [];
            let spacing = lenState4 / numParticles; 
            for(let i = 0; i < numParticles; i++) {
                particles.push({
                    dist: i * spacing, // EXACT even spacing
                    // 6 ohm gets 1/3 current, 3 ohm gets 2/3 current.
                    // So every 3rd particle goes to the 6 ohm branch (Top)
                    branch: (i % 3 === 0) ? 1 : 2 
                });
            }
        }
        initParticles();

        const messages = [
            "ආරම්භක පරිපථය (The Problem): 10V කෝෂයක්, 8Ω ප්‍රතිරෝධයක් සහ සමාන්තරගත 6Ω හා 3Ω.",
            "Step 1: Rapid Collapse -> සමාන්තරගත 6Ω හා 3Ω තනි 2Ω සමක ප්‍රතිරෝධයක් බවට පත් කිරීම.",
            "Step 2: Equivalent Circuit -> ශ්‍රේණිගත 8Ω හා 2Ω එකතු කර මුළු පරිපථයම තනි 10Ω බවට පත් කිරීම.",
            "Step 3: Total Current -> සමක පරිපථයට V=IR දැමීම. ප්‍රධාන ධාරාව = 10V / 10Ω = 1A. (ප්‍රවාහය අරඹයි)",
            "Step 4: Work Backwards -> 1A ධාරාව ආපසු ගොස් 8Ω හරහා ගමන් කර, 6Ω හා 3Ω අතර බෙදී යාම."
        ];

        function updateUI() {
            stepText.innerText = messages[state];
            btnPrev.disabled = (state === 0);
            btnNext.disabled = (state === 4);
        }

        function nextStep() {
            if(state < 4) { state++; updateUI(); }
        }

        function prevStep() {
            if(state > 0) { state--; updateUI(); }
        }

        function resetSim() {
            state = 0;
            updateUI();
            initParticles();
        }

        function getPointOnPath(path, dist, maxDist) {
            dist = dist % maxDist;
            let currentLen = 0;
            for(let i = 0; i < path.length - 1; i++) {
                let p1 = path[i];
                let p2 = path[i+1];
                let segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                if(dist <= currentLen + segLen) {
                    let ratio = (dist - currentLen) / segLen;
                    return { x: p1.x + (p2.x - p1.x) * ratio, y: p1.y + (p2.y - p1.y) * ratio };
                }
                currentLen += segLen;
            }
            return path[0];
        }

        function drawResistor(x, y, label, color) {
            ctx.fillStyle = '#141414';
            ctx.fillRect(x - 25, y - 12, 50, 24);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x-25, y); ctx.lineTo(x-20, y-10); ctx.lineTo(x-10, y+10); 
            ctx.lineTo(x, y-10); ctx.lineTo(x+10, y+10); ctx.lineTo(x+20, y-10); ctx.lineTo(x+25, y);
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.font = "bold 16px sans-serif";
            ctx.fillText(label, x - 12, y - 18);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Wires
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 6;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            
            if(state === 0 || state === 4) { 
                ctx.moveTo(100,200); ctx.lineTo(100,100); ctx.lineTo(350,100); 
                ctx.lineTo(450,50); ctx.lineTo(650,50); ctx.lineTo(750,100); 
                ctx.moveTo(350,100); ctx.lineTo(450,150); ctx.lineTo(650,150); ctx.lineTo(750,100); 
                ctx.lineTo(750,300); ctx.lineTo(100,300); ctx.lineTo(100,200); 
            } else if (state === 1) { 
                ctx.moveTo(100,200); ctx.lineTo(100,100); ctx.lineTo(750,100);
                ctx.lineTo(750,300); ctx.lineTo(100,300); ctx.lineTo(100,200);
            } else if (state === 2 || state === 3) { 
                ctx.moveTo(100,200); ctx.lineTo(100,100); ctx.lineTo(750,100);
                ctx.lineTo(750,300); ctx.lineTo(100,300); ctx.lineTo(100,200);
            }
            ctx.stroke();

            // Source (Battery)
            ctx.fillStyle = '#ff0055'; ctx.fillRect(70, 150, 60, 100);
            ctx.fillStyle = '#fff'; ctx.fillRect(85, 140, 30, 10);
            ctx.font = 'bold 20px sans-serif'; ctx.fillText('10V', 82, 210);

            // Resistors
            if(state === 0 || state === 4) {
                drawResistor(225, 100, "8Ω", "#fff");
                drawResistor(550, 50, "6Ω", "#00ffff");
                drawResistor(550, 150, "3Ω", "#ff00ff");
            } else if(state === 1) {
                drawResistor(225, 100, "8Ω", "#fff");
                drawResistor(550, 100, "2Ω (Eq)", "#ffff00");
            } else if(state === 2 || state === 3) {
                drawResistor(425, 100, "10Ω (Total)", "#00ff00");
            }

            // Particles (Current)
            if(state === 3 || state === 4) {
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffff00';

                particles.forEach(p => {
                    p.dist += 2.5; // Flow speed
                    
                    let pos;
                    if(state === 3) {
                        pos = getPointOnPath(pState3, p.dist, lenState3);
                    } else if(state === 4) {
                        pos = (p.branch === 1) ? getPointOnPath(pState4Top, p.dist, lenState4) : getPointOnPath(pState4Bot, p.dist, lenState4);
                    }

                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
