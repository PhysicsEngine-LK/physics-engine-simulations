<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Past Paper Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #0b0c10;
            --panel: #1f2833;
            --text: #c5c6c7;
            --accent: #66fcf1;
            --accent-soft: #45a29e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            background:
                radial-gradient(circle at top, rgba(102, 252, 241, 0.12), transparent 35%),
                linear-gradient(180deg, #07080b, var(--bg));
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(720px, 100%);
            background: rgba(31, 40, 51, 0.92);
            border: 1px solid rgba(102, 252, 241, 0.28);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            font-size: clamp(2rem, 5vw, 3rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        p {
            color: var(--accent-soft);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .links {
            display: grid;
            gap: 14px;
        }

        a {
            display: block;
            text-decoration: none;
            color: white;
            background: #0f141b;
            border: 1px solid rgba(102, 252, 241, 0.22);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 1.1rem;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        a:hover {
            transform: translateY(-2px);
            border-color: rgba(102, 252, 241, 0.5);
            box-shadow: 0 0 18px rgba(102, 252, 241, 0.18);
        }

        .hint {
            margin-top: 20px;
            font-size: 0.98rem;
            color: #8ea5a3;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Past Paper Battle</h1>
        <p>This section is hosted inside the same site but intentionally not linked from the main navigation.</p>
        <div class="links">
            <a href="./sim1.html">Open Sim 1: The Proportionality Lab</a>
            <a href="./sim2.html">Open Sim 2: Graph Comparisons</a>
        </div>
        <div class="hint">Direct URL only. Search engines are asked not to index this section.</div>
    </main>
</body>
</html>
