<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine - Velocity Vector Module</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 40, 51, 0.9);
            --accent-cyan: #66fcf1;
            --accent-teal: #45a29e;
            --accent-green: #00ff88;
            --text-main: #c5c6c7;
            --danger: #ff3366;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-cyan); letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .subtitle { font-family: 'Roboto Mono'; color: var(--accent-teal); font-size: 0.9rem; }

        .dashboard {
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(102, 252, 241, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 1200px;
        }

        canvas {
            background: #000;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        .stat-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-cyan);
        }

        .label { font-size: 0.85rem; color: var(--accent-teal); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-family: 'Roboto Mono'; font-size: 1.4rem; color: #fff; font-weight: bold; }

        button {
            background: linear-gradient(45deg, var(--accent-teal), var(--accent-cyan));
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Rajdhani';
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .reset-btn { background: transparent; border: 1px solid var(--text-main); color: var(--text-main); }

        .vector-legend {
            margin-top: 10px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .color-dot { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHYSICS ENGINE 2009 A/L MCQ</h1>
    </div>

    <div class="dashboard">
        <canvas id="simCanvas" width="600" height="500"></canvas>

        <div class="side-panel">
            <div class="stat-box">
                <div class="label">Status</div>
                <div id="statusText" class="value" style="color: var(--accent-cyan)">READY</div>
            </div>

            <div class="vector-legend">
                <div class="legend-item"><div class="color-dot" style="background: #fff"></div> String (Tangent)</div>
                <div class="legend-item"><div class="color-dot" style="background: var(--accent-green)"></div> Velocity Vector </div>
            </div>

            <button onclick="startSim()">Launch Engine</button>
            <button class="reset-btn" onclick="resetSim()">System Reset</button>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = 300;
        const centerY = 200;
        
        const R = 40; 
        const initialL = 200; 
        const v_mag = 5.0; 

        let alpha = 0; 
        let isRunning = false;
        let path = [];

        function drawArrow(fromx, fromy, tox, toy, color) {
            const headlen = 10;
            const dx = tox - fromx;
            const dy = toy - fromy;
            const angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cylinder
            ctx.beginPath();
            ctx.arc(centerX, centerY, R, 0, Math.PI * 2);
            ctx.strokeStyle = '#45a29e';
            ctx.lineWidth = 3;
            ctx.stroke();

            let currentL = initialL - (R * alpha);
            
            const tx = centerX + R * Math.cos(alpha);
            const ty = centerY + R * Math.sin(alpha);

            const ox = tx - currentL * Math.sin(alpha);
            const oy = ty + currentL * Math.cos(alpha);

            if (isRunning) {
                if (currentL > 0.5) { 
                    path.push({x: ox, y: oy});
                    alpha += (v_mag / currentL) * 0.15;
                } else {
                    isRunning = false;
                    document.getElementById('statusText').innerText = "IMPACT! ω = 0";
                    document.getElementById('statusText').style.color = "var(--danger)";
                }
            }

            // Draw String
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(ox, oy);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Draw Velocity Vector (Always perpendicular to string)
            // Direction is towards the tangent point T
            const vx = -Math.cos(alpha) * 50; 
            const vy = -Math.sin(alpha) * 50;
            if (currentL > 0) {
                drawArrow(ox, oy, ox + vx, oy + vy, '#00ff88');
                
                // Draw 90 degree indicator
                ctx.beginPath();
                const symbolSize = 10;
                ctx.moveTo(ox + vx/5, oy + vy/5);
                ctx.lineTo(ox + vx/5 + Math.sin(alpha)*symbolSize, oy + vy/5 - Math.cos(alpha)*symbolSize);
                ctx.lineTo(ox + Math.sin(alpha)*symbolSize, oy - Math.cos(alpha)*symbolSize);
                ctx.strokeStyle = '#00ff88';
                ctx.stroke();
            }

            // Draw Object
            ctx.beginPath();
            ctx.arc(ox, oy, 7, 0, Math.PI * 2);
            ctx.fillStyle = "#ff3366";
            ctx.fill();

            requestAnimationFrame(draw);
        }

        function startSim() {
            if(!isRunning && (initialL - R*alpha > 0.5)) {
                isRunning = true;
                document.getElementById('statusText').innerText = "EXECUTING...";
                document.getElementById('statusText').style.color = "var(--accent-cyan)";
            }
        }

        function resetSim() {
            alpha = 0;
            isRunning = false;
            path = [];
            document.getElementById('statusText').innerText = "READY";
            document.getElementById('statusText').style.color = "var(--accent-cyan)";
        }

        draw();
    </script>
</body>
</html>
