<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotational Dynamics Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 40, 51, 0.8);
            --accent-cyan: #66fcf1;
            --accent-teal: #45a29e;
            --text-main: #c5c6c7;
            --danger: #ff3366;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(102, 252, 241, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            gap: 30px;
            max-width: 900px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 280px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-left: 4px solid var(--accent-cyan);
            border-radius: 5px;
        }

        .label { font-size: 0.8rem; text-transform: uppercase; color: var(--accent-teal); }
        .value { font-family: 'Roboto Mono'; font-size: 1.4rem; color: #fff; font-weight: bold; }

        canvas {
            background: #000;
            border-radius: 50%;
            border: 2px solid #333;
            box-shadow: inset 0 0 30px rgba(102, 252, 241, 0.1);
        }

        button {
            background: linear-gradient(45deg, var(--accent-teal), var(--accent-cyan));
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Rajdhani';
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        button:disabled { background: #444; cursor: not-allowed; }

        .reset-btn { background: transparent; border: 1px solid var(--text-main); color: var(--text-main); }

        .physics-note {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--accent-teal);
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1 style="color: var(--accent-cyan); letter-spacing: 5px;">PHYSICS ENGINE: 2005 A/L</h1>

    <div class="container">
        <canvas id="simCanvas" width="450" height="450"></canvas>

        <div class="controls">
            <div class="stat-card">
                <div class="label">System Status</div>
                <div id="status" class="value" style="color: var(--accent-cyan);">INITIAL</div>
            </div>

            <div class="stat-card">
                <div class="label">Moment of Inertia (I)</div>
                <div id="inertiaVal" class="value">0.50 MR²</div>
            </div>

            <div class="stat-card">
                <div class="label">Angular Velocity (ω)</div>
                <div id="omegaVal" class="value">1.00 rad/s</div>
            </div>

            <button id="dropBtn" onclick="dropBall()">Drop Clay Ball (M/8)</button>
            <button class="reset-btn" onclick="resetSim()">System Reset</button>
            
            <p class="physics-note">
                Equation: I₁ω₁ = I₂ω₂ <br>
                (0.5)ω = (0.5 + 0.125)ω₂ <br>
                ω₂ = 0.8ω (4/5 speed)
            </p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const discRadius = 180;

        let angle = 0;
        let omega = 0.05; // Base angular velocity for animation
        let initialOmega = 0.05;
        let isBallDropped = false;
        let animationId;

        function drawDisc() {
            // Draw Main Disc
            ctx.beginPath();
            ctx.arc(centerX, centerY, discRadius, 0, Math.PI * 2);
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, discRadius);
            grad.addColorStop(0, '#1f2833');
            grad.addColorStop(1, '#0b0c10');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#45a29e';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw Grid Lines on Disc
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);
            
            ctx.strokeStyle = 'rgba(102, 252, 241, 0.2)';
            ctx.lineWidth = 1;
            for(let i=0; i<8; i++) {
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.lineTo(discRadius, 0);
                ctx.rotate(Math.PI / 4);
                ctx.stroke();
            }

            // Reference Marker
            ctx.beginPath();
            ctx.arc(discRadius - 20, 0, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#66fcf1';
            ctx.fill();

            // Draw Clay Ball if dropped
            if(isBallDropped) {
                ctx.beginPath();
                ctx.arc(discRadius, 0, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3366';
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff3366';
                ctx.stroke();
            }

            ctx.restore();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            angle += omega;
            drawDisc();
            animationId = requestAnimationFrame(update);
        }

        function dropBall() {
            if(!isBallDropped) {
                isBallDropped = true;
                // Conservation of Momentum: I1*w1 = I2*w2
                // (0.5) * w = (0.5 + 0.125) * w2
                // w2 = 0.5 / 0.625 = 0.8
                omega = initialOmega * 0.8;
                
                document.getElementById('status').innerText = "BALL ATTACHED";
                document.getElementById('status').style.color = "var(--danger)";
                document.getElementById('inertiaVal').innerText = "0.625 MR²";
                document.getElementById('omegaVal').innerText = "0.80 rad/s";
                document.getElementById('dropBtn').disabled = true;
            }
        }

        function resetSim() {
            isBallDropped = false;
            omega = initialOmega;
            angle = 0;
            document.getElementById('status').innerText = "INITIAL";
            document.getElementById('status').style.color = "var(--accent-cyan)";
            document.getElementById('inertiaVal').innerText = "0.50 MR²";
            document.getElementById('omegaVal').innerText = "1.00 rad/s";
            document.getElementById('dropBtn').disabled = false;
        }

        update();
    </script>
</body>
</html>
