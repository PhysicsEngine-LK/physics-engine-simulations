<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine | The Molecular Underworld</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --neon-red: #ff0055;
            --text-light: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard {
            width: 800px;
            max-width: 95vw;
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(176, 38, 255, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .status {
            font-size: 0.9rem;
            color: var(--neon-purple);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #050505;
            border-radius: 8px;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }

        .highlight {
            color: var(--neon-red);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div class="title">Phase 1: The Molecular Underworld</div>
            <div class="status" id="status-text">NET FORCE: 0 N (BALANCED)</div>
        </div>
        
        <div class="canvas-container" id="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>

        <div class="instructions">
            System Active: Drag your cursor inside the liquid matrix to move the target molecule. Observe the <span class="highlight">Resultant Force</span> at the surface boundary.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const statusText = document.getElementById('status-text');

        let width, height;
        let mouseX, mouseY;
        let liquidLevel;
        const sphereRadius = 80; 

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            liquidLevel = height * 0.35; // Surface is 35% from the top
            
            // Initial position
            mouseX = width / 2;
            mouseY = height * 0.7; 
        }

        window.addEventListener('resize', resize);
        resize();

        // Mouse/Touch Tracking
        function updateMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        }

        canvas.addEventListener('mousemove', updateMousePos);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevent scrolling
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        // Utility: Draw Arrow
        function drawArrow(ctx, fromX, fromY, toX, toY, color, width = 2) {
            const headlen = 10; 
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        // Draw static background molecules for visual depth
        const bgMolecules = [];
        for(let i=0; i<100; i++) {
            bgMolecules.push({
                x: Math.random(), 
                y: Math.random()
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Liquid Environment
            ctx.fillStyle = 'rgba(0, 243, 255, 0.05)';
            ctx.fillRect(0, liquidLevel, width, height - liquidLevel);
            
            // Surface line
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.moveTo(0, liquidLevel);
            ctx.lineTo(width, liquidLevel);
            ctx.stroke();
            ctx.shadowBlur = 0; // reset

            // Draw background molecules
            ctx.fillStyle = 'rgba(0, 243, 255, 0.2)';
            bgMolecules.forEach(m => {
                let actualY = liquidLevel + m.y * (height - liquidLevel);
                ctx.beginPath();
                ctx.arc(m.x * width, actualY, 3, 0, Math.PI*2);
                ctx.fill();
            });

            // 2. Target Molecule Logic
            // Clamp target to not fly out of the water completely
            let targetY = Math.max(liquidLevel, mouseY);
            let targetX = mouseX;

            // Sphere of Influence
            ctx.beginPath();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(176, 38, 255, 0.6)';
            ctx.lineWidth = 1;
            ctx.arc(targetX, targetY, sphereRadius, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Target Molecule Core
            ctx.beginPath();
            ctx.shadowColor = '#00f3ff';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ffffff';
            ctx.arc(targetX, targetY, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 3. Force Vectors Calculation
            let netForceY = 0;
            // Test forces every 45 degrees
            const angles = [0, 45, 90, 135, 180, 225, 270, 315];
            
            angles.forEach(deg => {
                let rad = deg * Math.PI / 180;
                let endX = targetX + Math.cos(rad) * sphereRadius;
                let endY = targetY + Math.sin(rad) * sphereRadius;

                // Only draw cohesive forces if the end point is INSIDE the liquid
                if (endY >= liquidLevel) {
                    drawArrow(ctx, targetX, targetY, endX, endY, 'rgba(0, 243, 255, 0.7)', 2);
                    netForceY += Math.sin(rad);
                }
            });

            // 4. Resultant Force (Net Force)
            // If near surface, top arrows are missing, creating a net downward Y force.
            if (netForceY > 0.5) {
                let forceMagnitude = netForceY * 25; 
                ctx.shadowColor = '#ff0055';
                ctx.shadowBlur = 20;
                drawArrow(ctx, targetX, targetY, targetX, targetY + forceMagnitude, '#ff0055', 4);
                ctx.shadowBlur = 0;
                
                statusText.innerText = `NET FORCE: MAX DOWNWARD TENSION`;
                statusText.style.color = '#ff0055';
            } else {
                statusText.innerText = `NET FORCE: 0 N (BALANCED)`;
                statusText.style.color = '#00f3ff';
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
